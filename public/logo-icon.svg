<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="BizInsight icon">
  <!-- Dark rounded-square background -->
  <rect width="40" height="40" rx="8" fill="#18181B"/>
  <!-- "B" in white, "I" in amber — "BI" = Business Intelligence / BizInsight -->
  <text
    y="30"
    x="4"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-1"
  >
    <tspan fill="#FFFFFF">B</tspan><tspan fill="#FBBF24">I</tspan>
  </text>
</svg>
